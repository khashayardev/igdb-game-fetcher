# ============================================================
# GitHub Actions Workflow for IGDB Game Fetcher
# این فایل باعث می‌شود اسکریپت پایتون به صورت خودکار در گیت‌هاب اجرا شود
# ============================================================

name: Fetch Games from IGDB

# تعیین زمان اجرای این workflow
on:
  # اجرای دستی از طریق دکمه Run workflow در تب Actions
  # این روش اصلی و پیشنهادی برای اجراست
  workflow_dispatch:
    inputs:
      start_year:
        description: 'سال شروع (اختیاری - پیش‌فرض 2000)'
        required: false
        default: '2000'
        type: string
      end_year:
        description: 'سال پایان (اختیاری - پیش‌فرض 2026)'
        required: false
        default: '2026'
        type: string
      year_chunk_size:
        description: 'تعداد سال در هر قطعه (اختیاری - پیش‌فرض 3)'
        required: false
        default: '3'
        type: string

  # اجرای زمانبندی شده - هر هفته یکبار در روز یکشنبه ساعت 00:00
  # توجه: برای فعال شدن این بخش، باید در مخزن خود تنظیمات Actions را فعال کنید
  schedule:
    - cron: '0 0 * * 0'  # هر یکشنبه ساعت نیمه شب

  # اجرا هنگام push روی شاخه main (برای تست خودکار)
  # push:
  #   branches:
  #     - main

# تعریف مجوزهای مورد نیاز
permissions:
  contents: read
  actions: write  # برای آپلود artifact نیاز است

jobs:
  fetch-games:
    # نوع ماشین مجازی که کد روی آن اجرا می‌شود
    runs-on: ubuntu-latest
    
    # حداکثر زمان مجاز برای اجرا (پیش‌فرض 360 دقیقه است)
    timeout-minutes: 30
    
    # مراحل اجرا
    steps:
      # مرحله 1: دریافت کدهای مخزن
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # فقط آخرین commit را دریافت کن (برای سرعت بیشتر)
      
      # مرحله 2: نصب پایتون
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'  # کش کردن وابستگی‌ها برای سرعت بیشتر در دفعات بعد
      
      # مرحله 3: نصب وابستگی‌های پایتون
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          # اگر نیاز به کتابخانه‌های دیگر دارید، اینجا اضافه کنید
      
      # مرحله 4: نمایش اطلاعات محیط برای دیباگ (اختیاری)
      - name: ℹ️ Show environment info
        run: |
          echo "Python version:"
          python --version
          echo "pip version:"
          pip --version
          echo "Current directory:"
          pwd
          echo "Files in directory:"
          ls -la
      
      # مرحله 5: اجرای اسکریپت اصلی
      - name: 🚀 Run fetch script
        run: |
          python fetch_games.py
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        # در صورت خطا، ادامه workflow متوقف می‌شود
      
      # مرحله 6: نمایش لیست فایل‌های تولید شده برای دیباگ
      - name: 📋 List generated files
        run: |
          echo "Generated JSON files:"
          ls -la *.json 2>/dev/null || echo "No JSON files found yet"
        continue-on-error: true
      
      # مرحله 7: آپلود فایل JSON به عنوان Artifact
      - name: 📤 Upload JSON as artifact
        uses: actions/upload-artifact@v4
        with:
          # نام Artifact - کاربران می‌توانند این را هنگام دانلود ببینند
          name: igdb-games-data
          # مسیر فایل‌هایی که باید آپلود شوند (از pattern استفاده می‌کند)
          path: |
            games_*.json
            stats_*.json
          # مدت زمان نگهداری Artifact به روز (بعد از این مدت حذف می‌شود)
          retention-days: 30
          # در صورت وجود فایل مشابه، بازنویسی شود
          if-no-files-found: warn
      
      # مرحله 8: اعلان موفقیت آمیز بودن اجرا (اختیاری)
      - name: ✅ Success notification
        if: success()
        run: |
          echo "🎉 Workflow completed successfully!"
          echo "📊 You can download the JSON files from the Artifacts section below."
      
      # مرحله 9: اعلان خطا (اختیاری)
      - name: ❌ Failure notification
        if: failure()
        run: |
          echo "❌ Workflow failed!"
          echo "Please check the logs above for more information."
          echo "Common issues:"
          echo "  - Missing or invalid API keys (TWITCH_CLIENT_ID / TWITCH_CLIENT_SECRET)"
          echo "  - Rate limiting from IGDB API"
          echo "  - Network issues"
