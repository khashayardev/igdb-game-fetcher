name: IGDB Complete Archive Scraper

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: 'سال شروع (مثلاً 2000)'
        required: true
        default: '2000'
        type: string
      end_year:
        description: 'سال پایان (مثلاً 2026)'
        required: true
        default: '2026'
        type: string
      min_rating:
        description: 'حداقل امتیاز (0 = بدون فیلتر، یا مثلاً 7.0)'
        required: false
        default: '0'
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: 📥 دریافت کدها
        uses: actions/checkout@v4
      
      - name: 🐍 نصب پایتون
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 نصب کتابخانه‌ها
        run: |
          pip install requests
      
      - name: 🚀 اجرای اسکریپت اسکرپینگ کامل IGDB
        env:
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
        run: |
          python igdb_complete_scraper.py ${{ github.event.inputs.start_year }} ${{ github.event.inputs.end_year }} ${{ github.event.inputs.min_rating }}
      
      - name: 📤 آپلود خروجی
        uses: actions/upload-artifact@v4
        with:
          name: complete-games-archive
          path: complete_games_archive_*.json
          retention-days: 90
